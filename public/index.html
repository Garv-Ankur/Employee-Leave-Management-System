<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Leave Management System</title>
    
    <link rel="icon" type="image/jpeg" href="/img/favicon.jpg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

    
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="card-title text-center mb-4">Leave Management System</h1>
                        <p class="text-center text-muted mb-4">Please select your role to continue.</p>
                        
                        <div class="d-grid gap-3">
                            <a href="/employee-login.html" class="btn btn-primary btn-lg">Employee Login</a>
                            <a href="/hr-login.html" class="btn btn-primary btn-lg">HR Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.add('fade-out');
            }
        });
    </script>
</body>
</html>
