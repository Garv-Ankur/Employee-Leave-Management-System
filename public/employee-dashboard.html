<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    
    <link rel="icon" type="image/jpeg" href="/img/favicon.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="preloader"><div class="spinner"></div></div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header"><h5 class="offcanvas-title" id="sidebarLabel">Dashboard Menu</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button></div>
        <div class="offcanvas-body">
            <div class="text-center mb-4"><i class="bi bi-person-circle fs-1 text-primary"></i><h6 class="mt-2" id="employee-name-display">Employee</h6></div>
            <div class="sidebar-stat"><small>Remaining Leaves</small><p id="sidebar-leave-balance" class="fw-bold fs-4">Loading...</p></div>
            <nav class="sidebar-nav"><a href="#" class="nav-link active" data-page="apply-leave"><i class="bi bi-send-plus-fill me-2"></i>Apply for Leave</a><a href="#" class="nav-link" data-page="leave-history"><i class="bi bi-calendar-check-fill me-2"></i>Leave History</a></nav>
            <div class="mt-auto"><button id="logout-btn" class="btn btn-danger w-100"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></div>
        </div>
    </div>

    <nav class="navbar fixed-top shadow-sm">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar"><i class="bi bi-list fs-4"></i></button>
            <a class="navbar-brand mx-auto" href="#">Leave Management System</a>
            <button class="btn theme-toggle-btn" id="theme-toggle-btn">
                <i class="bi bi-sun-fill" id="sun-icon"></i>
                <i class="bi bi-moon-stars-fill d-none" id="moon-icon"></i>
            </button>
        </div>
    </nav>
    
    <main class="container">
        <div id="apply-leave-page" class="page-content active">
            <section class="card form-card"><div class="card-header">Apply for Leave</div><div class="card-body"><form id="leave-form"><div class="mb-3"><label for="employeeName" class="form-label">Employee Name</label><input type="text" id="employeeName" name="employeeName" class="form-control" required readonly></div><div class="mb-3"><label for="leaveType" class="form-label">Leave Type</label><select id="leaveType" name="leaveType" class="form-select" required><option value="" disabled selected>Select a leave type...</option><option value="Vacation">Vacation</option><option value="Sick">Sick Leave</option><option value="Casual">Casual Leave</option><option value="Other">Other</option></select></div><div class="row"><div class="col-md-6 mb-3"><label for="startDate" class="form-label">Start Date</label><input type="date" id="startDate" name="startDate" class="form-control" required></div><div class="col-md-6 mb-3"><label for="endDate" class="form-label">End Date</label><input type="date" id="endDate" name="endDate" class="form-control" required></div></div><div class="mb-3"><label for="reason" class="form-label">Reason for Leave</label><textarea id="reason" name="reason" rows="3" class="form-control" required></textarea></div><button type="submit" class="btn btn-primary w-100">Submit Request</button></form></div></section>
        </div>
        <div id="leave-history-page" class="page-content">
            <section class="card"><div class="card-header">Your Leave History</div><div class="card-body"><div id="leave-history-list"></div><div id="leave-history-empty" class="empty-state" style="display: none;"><i class="bi bi-inbox fs-1"></i><p class="mt-3">You have no leave history yet.</p></div></div></section>
        </div>
    </main>

    <div class="modal fade" id="editLeaveModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Edit Leave Request</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="edit-leave-form"><input type="hidden" id="edit-request-id"><div class="mb-3"><label for="edit-startDate" class="form-label">Start Date</label><input type="date" id="edit-startDate" class="form-control" required></div><div class="mb-3"><label for="edit-endDate" class="form-label">End Date</label><input type="date" id="edit-endDate" class="form-control" required></div><div class="mb-3"><label for="edit-reason" class="form-label">Reason for Leave</label><textarea id="edit-reason" rows="3" class="form-control" required></textarea></div></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button type="button" id="save-edit-btn" class="btn btn-primary">Save Changes</button></div></div></div></div>
    <div class="modal fade" id="logoutConfirmModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Confirm Logout</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">Are you sure you want to log out?</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" id="confirm-logout-btn" class="btn btn-danger">Logout</button></div></div></div></div>
    <div id="toast-notification" class="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/employee.js"></script>
</body>
</html>
